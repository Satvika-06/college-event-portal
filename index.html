<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CampusHub Event Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

/* LOGIN */

#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1523580846011-d3a5bc25702b") center/cover no-repeat;
}

.login-box{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:40px;
border-radius:15px;
color:white;
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

/* MAIN */

#mainPage{
display:none;
min-height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.navbar{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:#4b4fa3;
color:white;
}

.navbar a{
margin-left:20px;
cursor:pointer;
}

/* HERO */

.hero{
height:90vh;
background:url("https://images.unsplash.com/photo-1503676260728-1c00da094a0b") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:45px;
}

.hero button{
margin-top:20px;
font-size:18px;
}

/* EVENTS */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:15px;
text-align:center;
}

/* CONTACT */

.contact{
max-width:500px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
text-align:center;
}

.contact input,
.contact textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
}

/* BUTTON */

button{
padding:10px 18px;
background:#ff7a18;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* POPUP */

#popup,#registerPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:1000;
}

.popup-box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:320px;

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.popup-box input{
width:100%;
padding:8px;
margin:8px 0;
border:1px solid #ccc;
}

/* SECTIONS */

.section{
display:none;
}

footer{
text-align:center;
padding:15px;
background:#4b4fa3;
color:white;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<h2>Student Login</h2>

<input id="roll" placeholder="Roll No">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>


<!-- MAIN PAGE -->

<div id="mainPage">

<nav class="navbar">

<h2>CampusHub</h2>

<div>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('events')">Events</a>
<a onclick="showPage('contact')">Contact</a>
</div>

</nav>


<!-- HOME -->

<div id="home" class="section">

<div class="hero">

<h1>College Event Portal</h1>
<p>Discover Amazing Campus Events</p>

<button onclick="showPage('events')">Explore Events</button>

</div>

</div>


<!-- EVENTS -->

<div id="events" class="section">

<div class="container" id="eventContainer"></div>

</div>


<!-- CONTACT -->

<div id="contact" class="section">

<div class="contact">

<h2>Contact Us</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<textarea id="msg" placeholder="Message"></textarea>

<button onclick="sendMsg()">Send</button>

</div>

</div>

<footer>
© 2026 CampusHub
</footer>

</div>


<!-- CONTACT POPUP -->

<div id="popup">

<div class="popup-box">

<h3>Message Sent Successfully ✅</h3>

<br>

<button onclick="closePopup()">OK</button>

</div>

</div>


<!-- REGISTER POPUP -->

<div id="registerPopup">

<div class="popup-box">

<h3>Event Registration</h3>

<input id="studentName" placeholder="Your Name">
<input id="studentRoll" placeholder="Roll No">
<input id="studentBranch" placeholder="Branch">

<button onclick="submitRegistration()">Submit</button>

<br><br>

<button onclick="closeRegister()">Cancel</button>

</div>

</div>


<script>

let events=[

{name:"Hackathon",img:"https://images.unsplash.com/photo-1518770660439-4636190af475"},
{name:"Music Fest",img:"https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2"},
{name:"Dance Competition",img:"https://images.unsplash.com/photo-1504609813442-a8924e83f76e"},
{name:"Cricket Tournament",img:"https://images.unsplash.com/photo-1540747913346-19e32dc3e97e"},
{name:"Coding Contest",img:"https://images.unsplash.com/photo-1517694712202-14dd9538aa97"},
{name:"Photography Contest",img:"https://aaft.com/blog/wp-content/uploads/2025/05/AdobeStock_150026021.jpeg"},
{name:"Robotics Workshop",img:"https://s3-ap-south-1.amazonaws.com/ricedigitals3bucket/AUPortalContent/2023/07/25174434/efc290acf4d2f1573b4a87aa3999508b.png"},
{name:"Startup Pitch",img:"https://images.unsplash.com/photo-1559136555-9303baea8ebd"},
{name:"Art Exhibition",img:"https://images.unsplash.com/photo-1513364776144-60967b0f800f"},
{name:"Gaming Tournament",img:"https://images.unsplash.com/photo-1511512578047-dfb367046420"},
{name:"Debate Competition",img:"https://images.unsplash.com/photo-1551836022-d5d88e9218df"},
{name:"AI Workshop",img:"https://images.unsplash.com/photo-1507149833265-60c372daea22"}

];

function login(){

let roll=document.getElementById("roll").value;
let pass=document.getElementById("pass").value;

if(roll && pass){

document.getElementById("loginPage").style.display="none";
document.getElementById("mainPage").style.display="block";

showPage("home");
loadEvents();

}else{

alert("Enter Roll and Password");

}

}

function showPage(page){

document.querySelectorAll(".section").forEach(sec=>{
sec.style.display="none";
});

document.getElementById(page).style.display="block";

}

function loadEvents(){

let container=document.getElementById("eventContainer");

container.innerHTML="";

events.forEach(e=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="${e.img}">

<div class="card-content">

<h3>${e.name}</h3>

<button onclick="openRegister()">Register</button>

</div>

`;

container.appendChild(card);

});

}

function openRegister(){

document.getElementById("registerPopup").style.display="block";

}

function closeRegister(){

document.getElementById("registerPopup").style.display="none";

}

function submitRegistration(){

let name=document.getElementById("studentName").value;
let roll=document.getElementById("studentRoll").value;
let branch=document.getElementById("studentBranch").value;

if(name && roll && branch){

alert("Registration Successful 🎉");

closeRegister();

}else{

alert("Fill all details");

}

}

function sendMsg(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let msg=document.getElementById("msg").value;

if(name!=="" && email!=="" && msg!==""){

document.getElementById("popup").style.display="block";

}else{

alert("Fill all fields");

}

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

</script>

</body>
</html>
