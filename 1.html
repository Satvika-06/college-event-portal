
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CampusHub Event Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

/* LOGIN PAGE */

#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1523580846011-d3a5bc25702b") center/cover no-repeat;
}

.login-box{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:40px;
width:320px;
border-radius:15px;
text-align:center;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#ff7a18;
color:white;
cursor:pointer;
font-weight:bold;
}

/* MAIN PAGE */

#mainPage{
display:none;
min-height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
padding:18px 40px;
background:#4b4fa3;
color:white;
}

.navbar a{
margin-left:20px;
color:white;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

/* HERO */

.hero{
height:80vh;
background:url("https://images.unsplash.com/photo-1519389950473-47ba0277781c") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:45px;
}

.hero p{
font-size:20px;
margin:15px 0;
}

/* EVENTS */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:30px;
}

.card{
background:white;
width:260px;
margin:15px;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.count{
color:red;
font-weight:bold;
}

/* CONTACT */

.contact{
max-width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

.contact input,
.contact textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

/* REGISTER POPUP */

#registerBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
width:300px;
}

#registerBox input{
width:100%;
padding:8px;
margin:8px 0;
}

/* SECTIONS */

.section{
display:none;
}

footer{
text-align:center;
padding:20px;
background:#4b4fa3;
color:white;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<h2>🎓 Student Login</h2>

<input id="roll" placeholder="Student Roll No">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- MAIN PAGE -->

<div id="mainPage">

<nav class="navbar">

<h2>CampusHub</h2>

<div>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('eventsPage')">Events</a>
<a onclick="showPage('contactPage')">Contact</a>
</div>

</nav>

<!-- HOME -->

<div id="home" class="section">

<div class="hero">

<h1>College Event Portal</h1>
<p>Discover & Register for Campus Events</p>

<button onclick="showPage('eventsPage')">Explore Events</button>

</div>

</div>

<!-- EVENTS -->

<div id="eventsPage" class="section">

<div class="container" id="events"></div>

</div>

<!-- CONTACT -->

<div id="contactPage" class="section">

<div class="contact">

<h2>Contact Us</h2>

<input placeholder="Your Name">
<input placeholder="Email">
<textarea placeholder="Message"></textarea>

<button>Send</button>

</div>

</div>

<footer>
© 2026 CampusHub
</footer>

</div>

<!-- REGISTER FORM -->

<div id="registerBox">

<h3>Event Registration</h3>

<input id="rname" placeholder="Your Name">
<input id="rroll" placeholder="Roll No">
<input id="remail" placeholder="Email">

<button onclick="submitRegister()">Submit</button>

</div>

<script>

let events=[

{name:"Hackathon",date:"2026-04-10",venue:"Computer Lab",img:"https://picsum.photos/400/200?1"},
{name:"Music Fest",date:"2026-04-15",venue:"Auditorium",img:"https://picsum.photos/400/200?2"},
{name:"Dance Competition",date:"2026-04-18",venue:"Open Stage",img:"https://picsum.photos/400/200?3"},
{name:"Cricket Tournament",date:"2026-04-20",venue:"Playground",img:"https://picsum.photos/400/200?4"},
{name:"Coding Contest",date:"2026-04-22",venue:"Lab 2",img:"https://picsum.photos/400/200?5"},
{name:"AI Workshop",date:"2026-04-24",venue:"Seminar Hall",img:"https://picsum.photos/400/200?6"},
{name:"Startup Pitch",date:"2026-04-26",venue:"Conference Hall",img:"https://picsum.photos/400/200?7"},
{name:"Photography Contest",date:"2026-04-27",venue:"Campus Park",img:"https://picsum.photos/400/200?8"},
{name:"Chess Tournament",date:"2026-04-28",venue:"Indoor Stadium",img:"https://picsum.photos/400/200?9"},
{name:"Drama Night",date:"2026-04-30",venue:"Main Stage",img:"https://picsum.photos/400/200?10"}

];

function login(){

let roll= document.getElementById("roll").value;
let pass= document.getElementById("pass").value;

if(roll && pass){

loginPage.style.display="none";
mainPage.style.display="block";

showPage("home");
show(events);

}
else{
alert("Enter Roll No and Password");
}

}

function showPage(page){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(page).style.display="block";

}

function show(list){

let container=document.getElementById("events");
container.innerHTML="";

list.forEach(e=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`

<img src="${e.img}">

<div class="card-content">

<h3>${e.name}</h3>
<p>Date: ${e.date}</p>
<p>Venue: ${e.venue}</p>
<p class="count">${countdown(e.date)}</p>

<button onclick="openRegister()">Register</button>

</div>

`;

container.appendChild(div);

});

}

function openRegister(){

document.getElementById("registerBox").style.display="block";

}

function submitRegister(){

let name=rname.value;
let roll=rroll.value;
let email=remail.value;

if(name && roll && email){

alert("Registered Successfully!");
document.getElementById("registerBox").style.display="none";

}
else{
alert("Please fill all details");
}

}

function countdown(date){

let d=new Date(date);
let now=new Date();
let diff=d-now;

let days=Math.ceil(diff/(1000*60*60*24));

if(days>0) return days+" days left";
else return "Started";

}

</script>

</body>
</html>
